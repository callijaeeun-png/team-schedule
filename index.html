<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀 스케줄 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .cell-tooltip { position: relative; }
        .cell-tooltip::after {
            content: attr(data-tooltip);
            position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%);
            padding: 8px 12px; background-color: #1e293b; color: white; font-size: 11px;
            border-radius: 8px; white-space: pre-wrap; width: max-content; max-width: 200px;
            z-index: 100; opacity: 0; visibility: hidden; transition: all 0.2s ease;
            pointer-events: none; text-align: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .cell-tooltip:hover::after { opacity: 1; visibility: visible; }
        .tab-active { color: #2563eb; border-bottom: 4px solid #2563eb; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .calendar-day { min-height: 110px; border: 1px solid #e2e8f0; transition: background 0.2s; }
        .task-memo-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out, padding 0.3s ease; }
        .task-item.expanded .task-memo-content { max-height: 500px; padding-top: 1rem; }
        .task-item.expanded .chevron-icon { transform: rotate(180deg); }
        .chevron-icon { transition: transform 0.3s; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 mb-8">
            <header class="flex flex-col lg:flex-row lg:items-center justify-between gap-6">
                <div>
                    <h1 class="text-3xl font-[900] text-slate-900 flex items-center gap-4 tracking-tighter">
                        <span class="p-3 bg-blue-600 rounded-2xl text-white shadow-xl shadow-blue-100"><i data-lucide="calendar-check"></i></span>
                        팀 스케줄 관리
                    </h1>
                    <p id="sync-status" class="text-slate-500 mt-3 font-medium text-lg flex items-center gap-2">
                        <span class="inline-block w-2.5 h-2.5 bg-slate-300 rounded-full animate-pulse"></span>
                        서버 연결 확인 중...
                    </p>
                </div>
                <div class="flex flex-wrap items-center gap-3">
                    <select id="team-filter" onchange="window.renderAll()" class="bg-slate-50 border border-slate-200 px-5 py-2.5 rounded-xl text-sm font-bold outline-none cursor-pointer hover:bg-slate-100 transition-all">
                        <option value="전체">전체 인원 현황</option>
                        <option value="산업팀">산업팀 명단</option>
                        <option value="경제팀">경제팀 명단</option>
                        <option value="미소속">미소속/기타</option>
                    </select>
                    <button onclick="openModal('add-member-modal')" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3.5 rounded-2xl font-black flex items-center gap-2 shadow-xl active:scale-95 transition-all">
                        <i data-lucide="user-plus" class="w-5 h-5"></i> 인원 추가
                    </button>
                </div>
            </header>
        </div>

        <div class="flex flex-wrap items-center gap-6 md:gap-10 mb-8 px-6 border-b border-slate-200 overflow-x-auto whitespace-nowrap">
            <button id="tab-daily" onclick="switchView('daily')" class="pb-4 text-lg md:text-xl font-black transition-all tab-active">일간 상세 스케줄</button>
            <button id="tab-weekly" onclick="switchView('weekly')" class="pb-4 text-lg md:text-xl font-black text-slate-400 hover:text-slate-600 transition-all">주간 전체 스케줄</button>
            <button id="tab-tasks" onclick="switchView('tasks')" class="pb-4 text-lg md:text-xl font-black text-slate-400 hover:text-slate-600 transition-all">일정 관리</button>
            <button id="tab-calendar" onclick="switchView('calendar')" class="pb-4 text-lg md:text-xl font-black text-slate-400 hover:text-slate-600 transition-all">일정 캘린더</button>
        </div>

        <div id="main-content">
            <div id="loading-overlay" class="p-32 text-center bg-white rounded-[2.5rem] border border-slate-200 shadow-sm">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent"></div>
                <p id="loading-text" class="mt-6 text-slate-500 font-bold italic">실시간 데이터를 가져오고 있습니다...</p>
            </div>

            <div id="daily-view" class="hidden space-y-6">
                <div id="day-selector" class="flex flex-wrap gap-2 p-1.5 bg-white border border-slate-200 rounded-2xl w-fit shadow-sm"></div>
                <div class="overflow-x-auto rounded-[2rem] border border-slate-200 bg-white shadow-xl">
                    <div id="daily-schedule-table" class="min-w-[1200px] p-2"></div>
                </div>
            </div>

            <div id="weekly-view" class="hidden">
                <div class="overflow-x-auto rounded-[2rem] border border-slate-200 bg-white shadow-xl">
                    <div id="weekly-summary-table" class="min-w-[1200px] p-2"></div>
                </div>
            </div>

            <div id="tasks-view" class="hidden space-y-6">
                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm flex flex-col md:flex-row justify-between items-center gap-4">
                    <h2 class="text-2xl font-black text-slate-900 tracking-tight">상세 일정 목록</h2>
                    <button onclick="openModal('add-task-modal')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3.5 rounded-2xl font-black flex items-center gap-2 transition-all shadow-lg shadow-indigo-50"><i data-lucide="plus" class="w-5 h-5"></i> 일정 추가</button>
                </div>
                <div id="task-list-container" class="space-y-4 pb-20"></div>
            </div>

            <div id="calendar-view" class="hidden space-y-6">
                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm flex justify-between items-center">
                    <button onclick="window.changeCalendarMonth(-1)" class="p-3 hover:bg-slate-100 rounded-full transition-all"><i data-lucide="chevron-left"></i></button>
                    <h2 id="calendar-title" class="text-2xl font-black text-slate-900">2026년 05월</h2>
                    <button onclick="window.changeCalendarMonth(1)" class="p-3 hover:bg-slate-100 rounded-full transition-all"><i data-lucide="chevron-right"></i></button>
                </div>
                <div class="bg-white rounded-[2rem] border border-slate-200 shadow-2xl overflow-hidden">
                    <div class="calendar-grid bg-slate-50 border-b border-slate-200 text-xs font-black p-4">
                        <div class="text-center text-red-500 uppercase">일</div><div class="text-center text-slate-500 uppercase">월</div>
                        <div class="text-center text-slate-500 uppercase">화</div><div class="text-center text-slate-500 uppercase">수</div>
                        <div class="text-center text-slate-500 uppercase">목</div><div class="text-center text-slate-500 uppercase">금</div>
                        <div class="text-center text-blue-500 uppercase">토</div>
                    </div>
                    <div id="calendar-grid-body" class="calendar-grid"></div>
                </div>
            </div>
        </div>

        <div class="mt-12 flex justify-end">
            <div id="badge-status" class="bg-slate-400 text-white px-6 py-3 rounded-2xl flex items-center gap-3 shadow-lg font-bold text-sm">
                <i data-lucide="wifi-off" class="w-4 h-4"></i> 연결 준비 중
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="add-member-modal" class="fixed inset-0 bg-slate-950/70 backdrop-blur-md flex items-center justify-center z-50 hidden p-4">
        <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-md shadow-2xl">
            <div class="flex justify-between items-center mb-10"><h2 class="text-3xl font-black text-slate-900">팀원 등록</h2><button onclick="closeModal('add-member-modal')"><i data-lucide="x" class="text-slate-400"></i></button></div>
            <form id="add-member-form" onsubmit="window.handleAddMember(event)" class="space-y-8">
                <div><label class="block text-xs font-black text-slate-400 mb-3 ml-1 uppercase">이름</label><input type="text" id="new-member-name" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-4 outline-none focus:ring-4 focus:ring-blue-100 font-bold" placeholder="성함을 입력하세요"></div>
                <div><label class="block text-xs font-black text-slate-400 mb-3 ml-1 uppercase">소속 팀 (중복 가능)</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="flex items-center justify-center p-5 rounded-2xl border-2 border-slate-100 bg-slate-50 cursor-pointer has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50 group transition-all"><input type="checkbox" name="team" value="산업팀" class="hidden"><span class="text-sm font-black group-has-[:checked]:text-blue-700">산업팀</span></label>
                        <label class="flex items-center justify-center p-5 rounded-2xl border-2 border-slate-100 bg-slate-50 cursor-pointer has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50 group transition-all"><input type="checkbox" name="team" value="경제팀" class="hidden"><span class="text-sm font-black group-has-[:checked]:text-blue-700">경제팀</span></label>
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-blue-700 transition-all active:scale-95">등록 완료</button>
            </form>
        </div>
    </div>
    <div id="add-task-modal" class="fixed inset-0 bg-slate-950/70 backdrop-blur-md flex items-center justify-center z-50 hidden p-4">
        <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-md shadow-2xl">
            <div class="flex justify-between items-center mb-8"><h2 class="text-2xl font-black text-slate-900">새 일정 추가</h2><button onclick="closeModal('add-task-modal')"><i data-lucide="x" class="text-slate-400"></i></button></div>
            <form id="add-task-form" onsubmit="window.handleAddTask(event)" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-[10px] font-black text-slate-400 mb-2 ml-1 uppercase">일자</label><input type="date" id="task-date" min="2026-05-01" max="2026-12-31" value="2026-05-01" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-sm"></div>
                    <div><label class="block text-[10px] font-black text-slate-400 mb-2 ml-1 uppercase">시간</label><input type="time" id="task-time" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-sm"></div>
                </div>
                <div><label class="block text-[10px] font-black text-slate-400 mb-2 ml-1 uppercase">일정 제목</label><input type="text" id="task-title" required class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 outline-none focus:ring-2 focus:ring-indigo-500 font-bold" placeholder="어떤 일정인가요?"></div>
                <div><label class="block text-[10px] font-black text-slate-400 mb-2 ml-1 uppercase">상세 메모</label><textarea id="task-memo" rows="4" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-indigo-500 font-medium text-sm resize-none"></textarea></div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-indigo-700 transition-all active:scale-95">일정 등록</button>
            </form>
        </div>
    </div>
    <div id="delete-confirm-modal" class="fixed inset-0 bg-slate-950/70 backdrop-blur-md flex items-center justify-center z-[60] hidden p-4">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-sm shadow-2xl text-center"><div class="flex justify-center mb-6"><div class="p-4 bg-red-100 text-red-600 rounded-full"><i data-lucide="trash-2" class="w-8 h-8"></i></div></div>
            <h3 class="text-2xl font-black text-slate-900 mb-2">삭제 확인</h3><p id="delete-target-name" class="text-slate-500 font-medium mb-8">정말로 삭제하시겠습니까?</p>
            <div class="flex gap-3"><button onclick="closeModal('delete-confirm-modal')" class="flex-1 py-4 bg-slate-100 text-slate-600 font-bold rounded-2xl hover:bg-slate-200 transition-all">취소</button><button id="final-delete-btn" class="flex-1 py-4 bg-red-600 text-white font-bold rounded-2xl hover:bg-red-700 transition-all">삭제</button></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, onSnapshot, updateDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 사용자님의 Firebase 설정 직접 주입
        const firebaseConfig = {
            apiKey: "AIzaSyD6JJmy4M3Q9M4Lw0AwT58WYTwxDjyOpRc",
            authDomain: "team-calander-3e013.firebaseapp.com",
            projectId: "team-calander-3e013",
            storageBucket: "team-calander-3e013.firebasestorage.app",
            messagingSenderId: "554318529461",
            appId: "1:554318529461:web:19fccd3d52878552ff4ffc",
            measurementId: "G-ZGZNHR5H5C"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = firebaseConfig.projectId;

        window.members = []; window.tasks = []; window.currentDay = '월'; window.viewMode = 'daily';
        window.calendarYear = 2026; window.calendarMonth = 5;

        async function init() {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        document.getElementById('sync-status').innerHTML = '<span class="inline-block w-2.5 h-2.5 bg-emerald-500 rounded-full"></span> 실시간 서버 연결됨';
                        document.getElementById('badge-status').className = "bg-emerald-600 text-white px-6 py-3 rounded-2xl flex items-center gap-3 shadow-lg font-bold text-sm";
                        document.getElementById('badge-status').innerHTML = '<i data-lucide="wifi"></i> 실시간 서버 동기화 활성';
                        startSync();
                    }
                });
            } catch (err) { document.getElementById('loading-text').innerText = "서버 연결 오류."; }
        }

        function startSync() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'members'), (snapshot) => {
                window.members = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                document.getElementById('loading-overlay').classList.add('hidden');
                checkView(); window.renderAll();
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), (snapshot) => {
                window.tasks = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                window.tasks.sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));
                window.renderAll();
            });
        }

        function checkView() { ['daily-view', 'weekly-view', 'tasks-view', 'calendar-view'].forEach(id => { if (id.startsWith(window.viewMode)) document.getElementById(id).classList.remove('hidden'); }); }

        window.handleAddMember = async (e) => {
            e.preventDefault();
            const name = document.getElementById('new-member-name').value;
            const teams = Array.from(document.querySelectorAll('input[name="team"]:checked')).map(cb => cb.value);
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'members'), { name, teams, schedule: {} });
            document.getElementById('add-member-form').reset(); closeModal('add-member-modal');
        };

        window.toggleTime = async (mid, day, hour) => {
            const m = window.members.find(x => x.id === mid);
            const cur = m.schedule[day] || [];
            const newSched = cur.includes(hour) ? cur.filter(h => h !== hour) : [...cur, hour].sort((a,b) => a-b);
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'members', mid), { [`schedule.${day}`]: newSched });
        };

        window.handleAddTask = async (e) => {
            e.preventDefault();
            const date = document.getElementById('task-date').value;
            const time = document.getElementById('task-time').value;
            const title = document.getElementById('task-title').value;
            const memo = document.getElementById('task-memo').value;
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), { date, time, title, memo });
            document.getElementById('add-task-form').reset(); closeModal('add-task-modal');
        };

        window.requestDelete = (id, name, type) => {
            document.getElementById('delete-target-name').innerText = `'${name}'을(를) 삭제하시겠습니까?`;
            openModal('delete-confirm-modal');
            document.getElementById('final-delete-btn').onclick = async () => {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', type === 'member' ? 'members' : 'tasks', id));
                closeModal('delete-confirm-modal');
            };
        };

        window.openModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
        window.toggleTaskDetail = (id) => { document.getElementById(`task-item-${id}`).classList.toggle('expanded'); lucide.createIcons(); };
        window.changeCalendarMonth = (o) => { window.calendarMonth += o; if (window.calendarMonth > 12) { window.calendarMonth = 1; window.calendarYear++; } else if (window.calendarMonth < 1) { window.calendarMonth = 12; window.calendarYear--; } window.renderAll(); };
        window.switchView = (m) => { window.viewMode = m; ['daily', 'weekly', 'tasks', 'calendar'].forEach(t => { document.getElementById(`tab-${t}`).className = t === m ? "pb-4 text-lg md:text-xl font-black transition-all tab-active" : "pb-4 text-lg md:text-xl font-black text-slate-400 hover:text-slate-600 transition-all"; document.getElementById(`${t}-view`).classList.toggle('hidden', t !== m); }); window.renderAll(); };

        window.renderAll = () => {
            if (window.viewMode === 'daily') renderDaily();
            else if (window.viewMode === 'weekly') renderWeekly();
            else if (window.viewMode === 'tasks') renderTasks();
            else if (window.viewMode === 'calendar') renderCalendar();
            lucide.createIcons();
        };

        function getIntensity(count, total) {
            if (count === 0) return 'bg-slate-50 text-slate-300';
            const r = count / (total || 1);
            if (r >= 0.8) return 'bg-blue-600 text-white';
            if (r >= 0.5) return 'bg-blue-400 text-white';
            if (r >= 0.2) return 'bg-blue-200 text-blue-800';
            return 'bg-blue-100 text-blue-700';
        }

        function renderDaily() {
            const days = ['월', '화', '수', '목', '금', '토', '일'];
            document.getElementById('day-selector').innerHTML = days.map(d => `<button onclick="window.currentDay='${d}'; window.renderAll()" class="px-7 py-3 rounded-2xl font-black ${window.currentDay === d ? 'bg-blue-600 text-white shadow-lg shadow-blue-100' : 'bg-white text-slate-500 hover:bg-slate-50'}">${d}요일</button>`).join('');
            const filter = document.getElementById('team-filter').value;
            const filtered = filter === '전체' ? window.members : window.members.filter(m => filter === '미소속' ? (m.teams||[]).length===0 : (m.teams||[]).includes(filter));
            const hours = Array.from({length:16}, (_,i)=>i+9);
            const summaries = hours.map(h => { const avail = filtered.filter(m => (m.schedule[window.currentDay] || []).includes(h)); return { count: avail.length, names: avail.map(m => m.name).join(', ') }; });
            let html = `<table class="w-full"><thead><tr class="bg-slate-50 border-b border-slate-200"><th class="p-6 text-left font-black text-slate-400 w-72 uppercase tracking-widest text-[10px]">명단 / ${window.currentDay}요일</th>${hours.map(h => `<th class="p-2 text-[10px] font-black text-slate-400 text-center">${h}:00</th>`).join('')}</tr></thead><tbody>`;
            html += `<tr class="bg-blue-50/50 border-b-2 border-blue-100"><td class="p-6 font-black text-blue-700 flex items-center gap-2"><i data-lucide="users" class="w-4 h-4"></i> 요약</td>${summaries.map(s => `<td class="p-1"><div data-tooltip="${s.count > 0 ? '가능: ' + s.names : '없음'}" class="cell-tooltip w-full h-16 flex items-center justify-center rounded-2xl font-black ${getIntensity(s.count, filtered.length)} transition-all">${s.count}</div></td>`).join('')}</tr><tr class="h-8"><td colspan="17"></td></tr>`;
            filtered.forEach(m => {
                const sched = m.schedule[window.currentDay] || [];
                html += `<tr class="border-b border-slate-50 group hover:bg-slate-50/30 transition-all"><td class="p-6 border-r relative flex items-center justify-between"><div><div class="flex items-center gap-2"><span class="font-black text-slate-800">${m.name}</span>${(m.teams||[]).length>=2?'<span class="text-[9px] bg-purple-600 text-white px-2 py-0.5 rounded-full font-black uppercase">Chief</span>':''}</div><div class="text-[10px] text-slate-400 font-bold mt-1 tracking-widest">${(m.teams||[]).join(', ')||'미소속'}</div></div><button onclick="window.requestDelete('${m.id}', '${m.name}', 'member')" class="p-2 text-slate-200 hover:text-red-500 rounded-xl opacity-0 group-hover:opacity-100 transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td>${hours.map(h => `<td class="p-1"><button onclick="window.toggleTime('${m.id}', '${window.currentDay}', ${h})" class="w-full h-12 rounded-2xl border-2 ${sched.includes(h) ? 'bg-blue-600 border-blue-700 shadow-xl' : 'bg-white border-slate-100 hover:border-blue-200'} transition-all"></button></td>`).join('')}</tr>`;
            });
            document.getElementById('daily-schedule-table').innerHTML = html + `</tbody></table>`;
        }

        function renderWeekly() {
            const filter = document.getElementById('team-filter').value;
            const filtered = filter === '전체' ? window.members : window.members.filter(m => filter === '미소속' ? (m.teams||[]).length===0 : (m.teams||[]).includes(filter));
            const hours = Array.from({length:16}, (_,i)=>i+9); const days = ['월', '화', '수', '목', '금', '토', '일'];
            let html = `<table class="w-full"><thead><tr class="bg-slate-50 border-b border-slate-200"><th class="p-6 text-left font-black text-slate-400 w-40 uppercase tracking-widest text-[10px]">주간 리포트</th>${hours.map(h => `<th class="p-2 text-[10px] font-black text-slate-400 text-center">${h}:00</th>`).join('')}</tr></thead><tbody>`;
            days.forEach(d => {
                html += `<tr class="border-b border-slate-50"><td class="p-6 font-black text-slate-700 bg-slate-50/10 text-center">${d}</td>`;
                hours.forEach(h => { const avail = filtered.filter(m => (m.schedule[d] || []).includes(h)); html += `<td class="p-1"><div data-tooltip="${avail.length > 0 ? avail.map(m => m.name).join(', ') : '없음'}" class="cell-tooltip w-full h-16 flex items-center justify-center rounded-2xl font-black ${getIntensity(avail.length, filtered.length)} transition-all">${avail.length}</div></td>`; });
                html += `</tr>`;
            });
            document.getElementById('weekly-summary-table').innerHTML = html + `</tbody></table>`;
        }

        function renderTasks() {
            const container = document.getElementById('task-list-container');
            if (window.tasks.length === 0) { container.innerHTML = `<div class="p-20 text-center bg-white rounded-3xl border border-slate-200 text-slate-400 font-bold italic">등록된 일정이 없습니다.</div>`; return; }
            container.innerHTML = window.tasks.map(t => `
                <div id="task-item-${t.id}" class="task-item bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm group hover:border-indigo-200 transition-all cursor-pointer" onclick="window.toggleTaskDetail('${t.id}')">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-6">
                            <div class="text-center bg-indigo-50 px-4 py-2 rounded-2xl border border-indigo-100 min-w-[100px]"><p class="text-[10px] font-black text-indigo-400 uppercase">${t.date.split('-')[0]}</p><p class="text-lg font-black text-indigo-700">${t.date.split('-')[1]}.${t.date.split('-')[2]}</p></div>
                            <div><div class="flex items-center gap-2 mb-1"><p class="text-sm font-black text-slate-400 flex items-center gap-1"><i data-lucide="clock" class="w-3 h-3"></i> ${t.time}</p>${t.memo ? '<span class="text-[10px] bg-indigo-100 text-indigo-600 px-1.5 py-0.5 rounded font-bold uppercase">MEMO</span>' : ''}</div><h4 class="text-xl font-black text-slate-800">${t.title}</h4></div>
                        </div>
                        <div class="flex items-center gap-2"><button onclick="event.stopPropagation(); window.requestDelete('${t.id}', '${t.title}', 'task')" class="p-3 text-slate-200 hover:text-red-500 rounded-xl opacity-0 group-hover:opacity-100 transition-all hover:bg-red-50"><i data-lucide="trash-2" class="w-5 h-5"></i></button><i data-lucide="chevron-down" class="chevron-icon w-5 h-5 text-slate-300"></i></div>
                    </div>
                    <div class="task-memo-content"><div class="p-6 bg-slate-50 rounded-2xl border border-slate-100 mt-2"><p class="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest text-xs">상세 메모</p><p class="text-slate-700 text-sm font-medium whitespace-pre-wrap leading-relaxed">${t.memo || '상세 메모가 없습니다.'}</p></div></div>
                </div>
            `).join('');
        }

        function renderCalendar() {
            document.getElementById('calendar-title').innerText = `${window.calendarYear}년 ${window.calendarMonth.toString().padStart(2, '0')}월`;
            const gridBody = document.getElementById('calendar-grid-body'); gridBody.innerHTML = '';
            const firstDay = new Date(window.calendarYear, window.calendarMonth - 1, 1).getDay();
            const daysInMonth = new Date(window.calendarYear, window.calendarMonth, 0).getDate();
            for (let i = 0; i < firstDay; i++) { const emptyCell = document.createElement('div'); emptyCell.className = 'calendar-day bg-slate-50/30'; gridBody.appendChild(emptyCell); }
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${window.calendarYear}-${window.calendarMonth.toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
                const dayTasks = window.tasks.filter(t => t.date === dateStr);
                const cell = document.createElement('div'); cell.className = 'calendar-day bg-white p-3 flex flex-col gap-1.5 overflow-y-auto cursor-pointer border hover:bg-slate-50 transition-all';
                cell.onclick = () => { if (dayTasks.length > 0) window.switchView('tasks'); };
                const dateNum = document.createElement('span'); dateNum.className = `font-black text-sm ${new Date(dateStr).getDay() === 0 ? 'text-red-500' : (new Date(dateStr).getDay() === 6 ? 'text-blue-500' : 'text-slate-700')}`; dateNum.innerText = d; cell.appendChild(dateNum);
                dayTasks.forEach(task => { const taskTag = document.createElement('div'); taskTag.className = 'text-[9px] bg-indigo-50 text-indigo-700 p-1 rounded font-black truncate border border-indigo-100'; taskTag.innerText = `[${task.time}] ${task.title}`; cell.appendChild(taskTag); });
                gridBody.appendChild(cell);
            }
        }
        init();
    </script>
</body>
</html>
